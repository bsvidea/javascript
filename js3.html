<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box
        {
            width: 10vw;
            height: 10vw;
            background-color: azure;
            margin:.2vw;
            border:.1vw solid black;
        }
        .rowbox
        {
            display: flex;
        }
    </style>
    <script>
        function play()
        {
            alert(event.target.id);
        }
        function setupgame()
        {
            for(i=0;i<3;i++)
            {
                var rowobj=document.createElement('div');
                rowobj.className='rowbox';
                for(j=0;j<3;j++)                
                {
                    var colobj=document.createElement('div');
                    colobj.className='box';
                    colobj.id="box"+i+'_'+j;
                    colobj.addEventListener('click',play);
                    rowobj.appendChild(colobj);
                    
                }
                document.getElementById('gamebox').appendChild(rowobj);
            }
        }
    </script>
</head>
<body onload="setupgame()">
    <div id="gamebox"></div>
</body>
</html>
