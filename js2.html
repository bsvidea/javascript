<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="mystyle.css">
    <script>
        function setupgame()
        {
            for(i=0;i<3;i++)
            {
                var crow=document.createElement('div');
                crow.className='rowline';
                for(j=0;j<3;j++)
                {
                    var obj=document.createElement('div');
                    obj.className='box';
                    crow.appendChild(obj);                
                }
                document.getElementById("gamebox").appendChild(crow);
            }
        }
    </script>
</head>
<body onload="setupgame()">
    <div id="gamebox">

    </div>
</body>
</html>
