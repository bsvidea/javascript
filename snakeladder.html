<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #left
        {
            width:60vw;
            background-color: darkkhaki;
            height: 95vh;
        }
        #right
        {
            width:35vw;
            height: 95vh;
            background-color: coral;
            text-align: center;
        }
        button{
            font-size: 1.2em;
            margin: 1vw;
        }
        #rolled{
            font-size: 3em;
        }
        .rows
        {
            display: flex;
        }
        .cols
        {
            width: 4vw;
            height: 4vw;
            background-color: rgb(49, 174, 0);
            margin: .15vw;
            font-size: 2em;
            text-align: center;
        }
        .currentbox
        {
            background-color: red;
        }
    </style>
    <script>
        var total=0;
        function rollon()
        {
            //(ul-ll+1)*random+ll

            var rnd=parseInt(6*Math.random())+1;
            document.getElementById("rolled").innerText=rnd;
            if(total+rnd>100)
            {
                return;
            }
            if(total>0)
            {
                document.getElementById("box"+total).classList.remove('currentbox');            
            }
            total+=rnd;
            document.getElementById("box"+total).classList.add('currentbox');
        }
        function setup()
        {
            var num=100;
            for(i=0;i<10;i++)
            {
                var rowdiv=document.createElement('div');
                rowdiv.className='rows';
                for(j=0;j<10;j++)
                {
                    var obj=document.createElement('div');
                    obj.className="cols";
                    obj.innerText=num;
                    obj.id="box"+num;
                    if(i%2==0)
                        num--;
                    else    
                        num++;
                    rowdiv.appendChild(obj);
                }
                if(i%2==0)
                    num-=9;
                else    
                    num-=11;
                document.getElementById("left").appendChild(rowdiv);

            }
        }

    </script>
</head>
<body onload="setup()">
    <div style="display: flex;">
        <div id="left"></div>
        <div id="right">
            <button onclick="rollon()">Roll Now</button>
            <div id="rolled"></div>
        </div>
    </div>
</body>
</html>
