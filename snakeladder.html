<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: aqua;
        }
        #leftdiv
        {
            background-color: white;
            width: 70vw;
            height:95vh;
            padding-left: 10vw;
        }
        #rightdiv
        {
            height:95vh;
            background-color: bisque;
            width: 25vw;
        }
        #game
        {
            display: flex;
            justify-content: space-around;
        }

        .mybox
        {
            width: 4vw;
            height: 4vw;
            background-color: cadetblue;
            margin: .1vw;
            font-size: 1.2em;
            font-weight: bold;
        }
        .rows
        {
            display: flex;
        }
        p{
            font-size: 2.5em;
        }
    </style>
    <script>
        function setupgame()
        {
            var num=100;
            for(i=0;i<10;i++)
            {
                var rowdiv=document.createElement('div');
                rowdiv.className="rows";
                for(j=0;j<10;j++)
                {
                    var box=document.createElement("div");
                    box.className="mybox";
                    box.innerText=num;
                    if(i%2==0)
                        num--;
                    else    
                        num++;
                    rowdiv.appendChild(box);
                }
                if(i%2==0)
                    num-=9;
                else    
                    num-=11;
                document.getElementById("leftdiv").appendChild(rowdiv);
            }
        }
        function rollthedice()
        {
            var num=parseInt(6*Math.random()+1);
            document.getElementById("rollednum").innerText=num;
        }
    </script>
</head>
<body onload="setupgame()">
    
    <div id="game">
        <div id="leftdiv"> </div>
        <div id="rightdiv">
            <button onclick="rollthedice()">Roll Dice</button>
            <p id="rollednum"></p>
        </div>
    </div>
</body>
</html>
