<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #leftdiv
        {
            width: 45vw;
            height: 45vw;
            background-image: url("snake-ladder-game.png");
            background-size: cover;
        }
        #currentbox
        {
            width: 4.5vw;
            height: 4.5vw;
            background-color: rgba(255,255,255,.6);
            position:absolute;
            display: none;
            
        }
        #currentturn
        {
            font-size: 2em;
        }
    </style>
    <script>
        var ypos=40.5;
        var xpos=-4.5;
        var total=0;
        function rolldice()
        {
            var num=parseInt(6*Math.random()+1);
            var obj=document.getElementById("currentbox");
            obj.style.display='block';
            total+=num;
            document.getElementById("currentturn").innerText=num + "("+ total+")";
            var r=total%10;
            r=r==0?10:r;
            if(parseInt(total/10)%2==0)
            {
                xpos=4.5*(r-1);
            
            }
            else
            {
                xpos=4.5*(10-r);
            }
                
            obj.style.left=xpos+"vw";
            obj.style.top=ypos+"vw";
            
        }
    </script>
</head>
<body>
    <div style="display: flex;"> 
        <div id="leftdiv">
            <div id="currentbox"></div>
        </div>
        <div>
            <button onclick="rolldice()">Roll the Dice</button>
            <p id="currentturn"></p>
        </div>
    </div>
</body>
</html>
